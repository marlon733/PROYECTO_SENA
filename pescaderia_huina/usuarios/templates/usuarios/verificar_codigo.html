{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificar código | Huina</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        :root {
            --primary-dark: #0f2c59;
            --secondary-blue: #3e78b2;
            --accent-gold: #d4af37;
            --light-bg: #f8fafc;
            --text-primary: #1e293b;
            --text-muted: #64748b;
            --error-color: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            height: 100%;
            font-family: 'Poppins', system-ui, -apple-system, sans-serif;
            background: var(--light-bg);
            letter-spacing: 0.3px;
        }

        .split {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .left {
            flex: 1.2;
            background: linear-gradient(135deg, var(--primary-dark) 0%, #06142e 50%, #0a1e3a 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .left::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(212, 175, 55, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(62, 120, 178, 0.08) 0%, transparent 50%);
            pointer-events: none;
        }

        .left::after {
            content: '';
            position: absolute;
            top: -50%;
            right: -30%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.12) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            filter: blur(50px);
        }

        .left img {
            width: 300px;
            position: relative;
            z-index: 2;
            animation: float 6s ease-in-out infinite;
            filter: drop-shadow(0 10px 30px rgba(0, 0, 0, 0.2));
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-25px); }
        }

        .left h3 {
            font-size: 1.4rem;
            font-weight: 800;
            margin-top: 2rem;
            position: relative;
            z-index: 2;
            letter-spacing: 2px;
            color: #ffffff;
        }

        .left p {
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.8);
            position: relative;
            z-index: 2;
            font-weight: 500;
            letter-spacing: 0.5px;
            margin-top: 0.8rem;
        }

        .right {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            background: linear-gradient(180deg, #fafbfc 0%, var(--light-bg) 100%);
        }

        .box {
            width: 100%;
            max-width: 480px;
            background: white;
            padding: 50px 40px;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(15, 44, 89, 0.12);
            animation: slideInRight 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            transition: all 0.3s ease;
        }

        .box:hover {
            box-shadow: 0 30px 80px rgba(15, 44, 89, 0.18);
            transform: translateY(-5px);
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(40px); }
            to { opacity: 1; transform: translateX(0); }
        }

        h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
            letter-spacing: -0.5px;
        }

        h2 {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.8rem;
        }

        .box > p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 1.8rem;
            line-height: 1.7;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 14px;
            border: 2px solid #e2e8f0;
            margin: 15px 0;
            font-size: 1rem;
            font-family: 'Poppins', sans-serif;
            color: var(--text-primary);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 4px 16px rgba(15, 44, 89, 0.06);
            font-weight: 500;
            background: white;
        }

        input::placeholder {
            color: rgba(15, 44, 89, 0.3);
        }

        input:focus {
            outline: none;
            border-color: var(--accent-gold);
            background: white;
            box-shadow: 0 8px 32px rgba(212, 175, 55, 0.15);
            transform: translateY(-2px);
        }

        input:hover:not(:focus) {
            border-color: #a1aec4;
            background: rgba(248, 250, 252, 0.8);
        }

        .alert {
            padding: 14px 16px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            border: none;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(239, 68, 68, 0.1);
            color: #991b1b;
            border-left: 4px solid var(--error-color);
            margin-bottom: 20px;
            animation: slideIn 0.4s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        button {
            width: 100%;
            padding: 14px 24px;
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--secondary-blue) 100%);
            color: white;
            border: 2px solid transparent;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 8px 24px rgba(15, 44, 89, 0.25);
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            white-space: nowrap;
            font-family: 'Poppins', sans-serif;
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            margin-top: 10px;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.3), transparent);
            transition: left 0.5s ease;
        }

        button:hover {
            background: linear-gradient(135deg, var(--secondary-blue) 0%, #2c5aa0 100%);
            box-shadow: 0 12px 32px rgba(15, 44, 89, 0.35);
            transform: translateY(-2px);
        }

        button:hover::before {
            left: 100%;
        }

        button:active {
            transform: translateY(0);
            box-shadow: 0 5px 15px rgba(15, 44, 89, 0.2);
        }

        form {
            margin-top: 15px;
        }

        @media (max-width: 992px) {
            .left { display: none; }
            .box {
                padding: 40px 30px;
                border-radius: 16px;
            }
            h1 { font-size: 1.6rem; }
            h2 { font-size: 1.2rem; }
        }

        @media (max-width: 480px) {
            .right { padding: 1.5rem; }
            .box {
                padding: 30px 20px;
                max-width: 100%;
            }
            h1 { font-size: 1.4rem; }
            h2 { font-size: 1rem; }
            input {
                padding: 12px 14px;
                font-size: 16px;
            }
            button {
                padding: 12px 20px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>

<body>

<div class="split">

    <div class="left">
        <img src="{% static 'img/LGO.png' %}">
        <h3>Gestión Huina</h3>
        <p>Verificación segura</p>
    </div>

    <div class="right">
        <div class="box">
            <h1>PESCADERÍA HUINA</h1>
            <h2>Verificar código</h2>
            <p>Ingresa el código enviado a tu correo.</p>

            {% if messages %}
                {% for message in messages %}
                    <div class="alert">{{ message }}</div>
                {% endfor %}
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                <input type="text" name="codigo" placeholder="Código de 6 dígitos" required>
                <button>Verificar</button>
            </form>
        </div>
    </div>

</div>

</body>
</html>
